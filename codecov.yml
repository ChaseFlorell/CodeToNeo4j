coverage:
  status:
    project:
      default:
        target: auto    # fail if coverage drops from baseline
        threshold: 1%   # allow up to 1% drop without failing
    patch:
      default:
        target: 85%     # new code should have ≥85% coverage
        threshold: 5%   # allow up to 5% below target without failing (handles untestable lines in new files)
comment:
  layout: "reach,diff,flags,files"
  behavior: default
