changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - renovate-bot
      - dependabot
      - junie-agent
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
        - ci
        - build
    - title: "📦 Dependencies"
      labels:
        - dependency
        - dependencies
