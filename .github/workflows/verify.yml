name: Build, Test, and Cover

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1
        clean: false

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.5'
        channel: 'stable'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Dart Test
      working-directory: tools/dart-analyzer
      run: |
        dart pub get
        dart test --coverage=coverage --reporter=compact --file-reporter=json:dart-test-results.json
        dart pub run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

    - name: .NET Restore
      run: dotnet restore

    - name: .NET Build
      run: dotnet build --no-restore -c Release

    - name: .NET Test
      run: |
        rm -rf ./TestResults
        dotnet test --no-build -c Release --verbosity normal --logger "trx" --results-directory ./TestResults --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: Upload Dart Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: tools/dart-analyzer/coverage/lcov.info
        flags: dart
        fail_ci_if_error: false

    - name: Upload .NET Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ./TestResults
        flags: dotnet
        fail_ci_if_error: false

    - name: Test Summary PR Comment
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v8
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const script = require('./.github/scripts/test-summary-comment.js')
          await script({github, context})
