name: Create Release
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1
        clean: false

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.5'
        channel: 'stable'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release /p:Version=${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Pack
      run: dotnet pack src/CodeToNeo4j/CodeToNeo4j.csproj --no-restore -c Release -o out /p:Version=${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}

    - name: Attest build provenance
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: out/*.nupkg

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: CodeToNeo4j.nupkg
        path: out/*.nupkg

    - name: Push to NuGet.org
      run: dotnet nuget push out/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_KEY }}

    - name: Push to GitHub Packages
      run: dotnet nuget push out/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}
        name: Release v${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}
        body: |
          ## Installation
          Install from Nuget:
          [![NuGet](https://img.shields.io/badge/nuget-v${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}-blue)](https://www.nuget.org/packages/CodeToNeo4j/${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }})

          Install from CLI:
          ```bash
          dotnet tool install --global CodeToNeo4j --version ${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ github.run_number }}
          ```
          ## Provenance
          | Commit | Build |
          | -- | -- |
          | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) | [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          Verify package attestation:
          ```bash
          gh attestation verify <path-to-nupkg> --repo ${{ github.repository }}
          ```
        generate_release_notes: true
        files: out/*.nupkg
