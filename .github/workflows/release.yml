name: Release
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      MAJOR: 1
      MINOR: 1

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release /p:Version=${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Pack
      run: dotnet pack src/CodeToNeo4j/CodeToNeo4j.csproj --no-build -c Release -o out /p:Version=${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodeToNeo4j.nupkg
        path: out/*.nupkg

    - name: Push to NuGet.org
      run: dotnet nuget push out/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_KEY }}

    - name: Push to GitHub Packages
      run: dotnet nuget push out/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}
        name: Release v${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}
        body: |
          ### Installation
          Install from Nuget:
          [![NuGet](https://img.shields.io/badge/nuget-v${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}-blue)](https://www.nuget.org/packages/CodeToNeo4j/${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }})
          
          Install from CLI:
          ```bash
          dotnet tool install --global CodeToNeo4j --version ${{ env.MAJOR }}.${{ env.MINOR }}.${{ github.run_number }}
          ```
        generate_release_notes: true
        files: out/*.nupkg
