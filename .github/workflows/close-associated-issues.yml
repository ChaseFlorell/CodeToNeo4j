name: Close Associated Issues

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-issues:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Close Associated Issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require('./.github/scripts/close-associated-issues.js')
            await script({github, context})
