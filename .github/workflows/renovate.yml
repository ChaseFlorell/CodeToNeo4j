name: Renovate Dependencies

on:
  schedule:
    # Every day at 5am UTC
    - cron: '0 5 * * *'
  workflow_dispatch: { }

permissions:
  contents: write
  pull-requests: write

env:
  # Use the same config file as in Azure pipeline
  RENOVATE_CONFIG_FILE: renovate-config.js

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1
          clean: true

      - name: Setup .NET (use global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Configure git user for Renovate
        run: |
          git config --global user.email 'chase.florell@gmail.com'
          git config --global user.name 'Chase Florell'

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Run Renovate
        env:
          # GitHub automatically provides this token; mirror Azure's TOKEN/GITHUB_COM_TOKEN usage
          TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: npx renovate
